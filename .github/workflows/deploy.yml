name: CI/CD Backend Innovatech

on:
  push:
    branches:
      - deploy

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build y Push a Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/innovatech-backend:latest

      - name: Despliegue en AWS EC2 (Backend)
        uses: appleboy/ssh-action@master
        with:
          proxy_host: ${{ secrets.EC2_FRONT_HOST }}
          proxy_username: ${{ secrets.EC2_USER }}
          proxy_key: ${{ secrets.EC2_SSH_KEY }}
          host: ${{ secrets.EC2_BACK_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USER }}
            # 1. Creamos el archivo docker-compose.yml en la EC2 de producción
            cat << 'EOF' > docker-compose.yml
            version: '3.8'
            services:
              db:
                image: postgres:15-alpine
                container_name: innovatech-db
                environment:
                  POSTGRES_USER: admin
                  POSTGRES_PASSWORD: password123
                  POSTGRES_DB: innovatech_db
                ports:
                  - "5432:5432"
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                networks:
                  - innovatech_net
              backend:
                image: ${{ secrets.DOCKER_USERNAME }}/innovatech-backend:latest
                container_name: innovatech-backend
                environment:
                  SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/innovatech_db
                  SPRING_DATASOURCE_USERNAME: admin
                  SPRING_DATASOURCE_PASSWORD: password123
                  SPRING_JPA_HIBERNATE_DDL_AUTO: update
                ports:
                  - "8080:8080"
                depends_on:
                  - db
                networks:
                  - innovatech_net
            networks:
              innovatech_net:
                driver: bridge
            volumes:
              postgres_data:
            EOF
            # 2. Descargamos la imagen nueva y levantamos el stack con persistencia
            docker-compose pull backend
            docker-compose up -d