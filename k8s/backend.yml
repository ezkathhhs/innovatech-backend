apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: 604672140843.dkr.ecr.us-east-1.amazonaws.com/innovatech-backend:latest
        env:
        - name: DB_URL
          value: "jdbc:mysql://mysql-service:3306/innovatech_db"
        - name: DB_USER
          value: "root"
        - name: DB_PASS
          value: "Innovatech2026!"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
  - port: 8080
    targetPort: 8080